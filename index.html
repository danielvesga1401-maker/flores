<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flores Amarillas 💛</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #fff8e1 0%, #ffe082 50%, #ffca28 100%);
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
}


.message {
  position: absolute;
  top: 52%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
  width: 90%;
}

h1 {
  color: #fbc02d;
  font-size: 24px;
  margin-bottom: 8px;
}

p {
  color: #555;
  font-size: 14px;
  max-width: 260px;
  margin: auto;
  line-height: 1.5;
}


.flower {
  position: absolute;
  width: 5px;
  height: 5px;
  background: #ffeb3b;
  border-radius: 50%;
  box-shadow: 0 0 6px #fbc02d;
  opacity: 0;
  animation: appear 2s forwards;
}


.fall {
  position: absolute;
  font-size: 16px;
  animation: fall linear infinite;
  z-index: 5;
  pointer-events: none;
}


@keyframes appear {
  from {
    opacity: 0;
    transform: scale(0);
  }
  to {
    opacity: 0.9;
    transform: scale(1);
  }
}

@keyframes fall {
  from {
    transform: translateY(-10vh) rotate(0deg);
  }
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}


@media (max-width: 480px){
  h1{
    font-size:20px;
  }
  p{
    font-size:13px;
  }
}
</style>
</head>

<body>

<div class="message">
  <h1>🌼 Para mi chata ♡</h1>
  <p>
    Hoy 21 de marzo, día de las flores amarillas,  
    quiero recordarte cuánto te quiero ♡  
    Me encantan tus ojos, tienen algo que me atrapa  
    y me hacen sentir en casa ✨  
    Te quiero mucho, mi chata 🌼
  </p>
</div>

<script>

let scale = Math.min(window.innerWidth, window.innerHeight) / 25;


let total = 500;

for (let i = 0; i < total; i++) {
  let flower = document.createElement("div");
  flower.className = "flower";

  let t = Math.random() * Math.PI * 2;

  let x = 16 * Math.pow(Math.sin(t), 3);
  let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

  let posX = x * scale + window.innerWidth / 2;
  let posY = y * scale + window.innerHeight / 2;

  flower.style.left = posX + "px";
  flower.style.top = posY + "px";
  flower.style.animationDelay = (Math.random() * 2) + "s";

  document.body.appendChild(flower);
}


for(let i = 0; i < 50; i++){
  let f = document.createElement("div");
  f.className = "fall";
  f.innerHTML = "🌼";

  f.style.left = Math.random() * window.innerWidth + "px";
  f.style.top = "-50px";
  f.style.animationDuration = (Math.random() * 4 + 4) + "s";
  f.style.animationDelay = (Math.random() * 5) + "s";
  f.style.opacity = Math.random() * 0.7 + 0.3;

  document.body.appendChild(f);
}
</script>

</body>
</html>
